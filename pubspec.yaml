name: prinsights
description: "AI-Powered Social Media Insights & Dashboard"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ----------------------------
  # State management
  # ----------------------------
  provider: ^6.1.1

  # ----------------------------
  # Networking & utilities
  # ----------------------------
  http: ^1.1.0
  intl: ^0.20.0
  flutter_dotenv: ^6.0.0

  # ----------------------------
  # File picker (AGP 8 SAFE)
  # ----------------------------
  file_picker: ^8.3.3

  # ----------------------------
  # Persistence
  # ----------------------------
  shared_preferences: ^2.2.2

  # ----------------------------
  # OAuth / Login
  # ----------------------------
  flutter_facebook_auth: ^6.0.3
  url_launcher: ^6.2.6

  # ----------------------------
  # Deep linking (Instagram OAuth return)
  # ----------------------------
  app_links: ^6.0.0

  # ----------------------------
  # UI & Charts
  # ----------------------------
  cupertino_icons: ^1.0.8
  fl_chart: ^1.1.0
  font_awesome_flutter: ^10.5.0
  flutter_animate: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - .env
